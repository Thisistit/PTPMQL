<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

<div class="container mt-3">
  <h3>Điền thông tin</h3>
    
  <form action="/action_page.php" class="was-validated">
    <div class="mb-3 mt-3">
      <label for="uname" class="form-label">Tên:</label>
      <input type="text" class="form-control" id="uname" placeholder="Họ và tên" name="uname" required>
      <div class="valid-feedback">Valid.</div>
      <div class="invalid-feedback">Hãy điền thông tin.</div>
    </div>
    <div class="mb-3">
      <label for="pwd" class="form-label">Mật khẩu:</label>
      <input type="password" class="form-control" id="pwd" placeholder="Mật khẩu" name="pswd" required>
      <div class="valid-feedback">Valid.</div>
      <div class="invalid-feedback">Hãy điền thông tin.</div>
    </div>
    <div class="form-check mb-3">
      <input class="form-check-input" type="checkbox" id="myCheck"  name="remember" required>
      <label class="form-check-label" for="myCheck">blabla.</label>
      <div class="valid-feedback">Valid.</div>
      <div class="invalid-feedback">Ấn vào ô.</div>
    </div>
  <button type="submit" class="btn btn-primary">Gửi</button>
  </form>
</div>

</body>
</html>
